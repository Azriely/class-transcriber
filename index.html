<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Transcriber</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 data-i18n="app.title">Class Transcriber</h1>
      <nav class="header-controls">
        <button id="lang-toggle" class="btn-icon" data-i18n-title="app.toggleLanguage" title="Toggle language">
          <span data-i18n="app.lang">EN</span>
        </button>
        <button id="settings-btn" class="btn-icon" data-i18n-title="app.settings" title="Settings">
          &#9881;
        </button>
      </nav>
    </header>

    <main class="main-content">
      <section id="upload-zone" class="upload-zone">
        <p data-i18n="upload.prompt">Drag &amp; drop an audio file here, or click to select</p>
        <input type="file" id="file-input" accept="audio/*" hidden>
        <button id="upload-btn" class="btn-primary" data-i18n="upload.button">Choose File</button>
      </section>

      <section id="transcript-area" class="transcript-area" hidden>
        <h2 data-i18n="transcript.title">Transcript</h2>
        <div id="transcript-content" class="content-box"></div>
      </section>

      <section id="summary-area" class="summary-area" hidden>
        <h2 data-i18n="summary.title">Summary</h2>
        <div id="summary-content" class="content-box"></div>
      </section>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" hidden>
      <div class="modal-overlay"></div>
      <div class="modal-dialog">
        <header class="modal-header">
          <h2 data-i18n="settings.title">Settings</h2>
          <button id="settings-close" class="btn-icon" data-i18n-title="settings.close" title="Close">&times;</button>
        </header>
        <div class="modal-body">
          <p data-i18n="settings.placeholder">Settings will appear here.</p>
        </div>
      </div>
    </div>

    <!-- History Sidebar -->
    <aside id="history-sidebar" class="history-sidebar">
      <h2 data-i18n="history.title">History</h2>
      <ul id="history-list" class="history-list"></ul>
    </aside>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
