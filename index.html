<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Transcriber</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- ===== Header Bar ===== -->
    <header class="app-header">
      <h1 data-i18n="app.title">Class Transcriber</h1>
      <nav class="header-controls">
        <div class="lang-toggle" role="group" aria-label="Language">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="pt">PT</button>
        </div>
        <button id="settings-btn" class="btn-icon" title="Settings" data-i18n-title="settings.title">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="3"/>
            <path d="M16.5 10a1.5 1.5 0 0 0 .3 1.65l.05.05a1.82 1.82 0 1 1-2.57 2.57l-.05-.05a1.5 1.5 0 0 0-1.65-.3 1.5 1.5 0 0 0-.91 1.37v.15a1.82 1.82 0 1 1-3.64 0v-.08A1.5 1.5 0 0 0 7.05 13.8a1.5 1.5 0 0 0-1.65.3l-.05.05a1.82 1.82 0 1 1-2.57-2.57l.05-.05A1.5 1.5 0 0 0 3.13 9.88a1.5 1.5 0 0 0-1.37-.91H1.6a1.82 1.82 0 1 1 0-3.64h.08A1.5 1.5 0 0 0 3.05 4.35a1.5 1.5 0 0 0-.3-1.65l-.05-.05A1.82 1.82 0 1 1 5.27.08l.05.05a1.5 1.5 0 0 0 1.65.3h.07A1.5 1.5 0 0 0 7.95 -.96V-1.1a1.82 1.82 0 0 1 3.64 0v.08a1.5 1.5 0 0 0 .91 1.37 1.5 1.5 0 0 0 1.65-.3l.05-.05a1.82 1.82 0 1 1 2.57 2.57l-.05.05a1.5 1.5 0 0 0-.3 1.65v.07a1.5 1.5 0 0 0 1.37.91h.15a1.82 1.82 0 0 1 0 3.64h-.08a1.5 1.5 0 0 0-1.37.91z"/>
          </svg>
        </button>
      </nav>
    </header>

    <!-- ===== Layout Wrapper ===== -->
    <div class="layout">
      <!-- ===== Main Content ===== -->
      <main class="main-content">
        <p class="app-subtitle" data-i18n="app.subtitle">Upload your class recording to get a transcription</p>

        <!-- Upload Zone -->
        <section id="upload-zone" class="upload-zone">
          <div class="upload-zone-content">
            <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="upload-main-text" data-i18n="upload.dragDrop">Drag &amp; drop your audio file here</p>
            <span class="upload-divider" data-i18n="upload.or">or</span>
            <button id="browse-btn" class="btn-secondary" data-i18n="upload.browse">Browse files</button>
            <p class="upload-formats" data-i18n="upload.formats">Supported: MP3, M4A, WAV, OGG, WebM</p>
          </div>
          <input type="file" id="file-input" accept="audio/*,video/mp4,.m4a" hidden>
        </section>

        <!-- File Info -->
        <section id="file-info" class="file-info" hidden>
          <div class="file-info-details">
            <svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            <div class="file-meta">
              <span id="file-name" class="file-name"></span>
              <span id="file-size" class="file-size"></span>
            </div>
          </div>
          <div class="file-info-actions">
            <button id="transcribe-btn" class="btn-primary" data-i18n="upload.title">Transcribe</button>
            <button id="remove-file-btn" class="btn-ghost" data-i18n="upload.remove" title="Remove file">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </section>

        <!-- Progress Section -->
        <section id="progress-section" class="progress-section" hidden>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-info">
            <span id="progress-text" class="progress-text" data-i18n="progress.transcribing">Transcribing...</span>
            <button id="cancel-btn" class="btn-ghost btn-danger-text" data-i18n="progress.cancel">Cancel</button>
          </div>
        </section>

        <!-- Transcript Section -->
        <section id="transcript-section" class="result-section" hidden>
          <div class="result-header">
            <h2 data-i18n="transcript.title">Transcription</h2>
            <div class="result-actions">
              <button id="copy-transcript-btn" class="btn-icon-sm" title="Copy" data-i18n-title="transcript.copy">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
              <button id="download-transcript-btn" class="btn-icon-sm" title="Download" data-i18n-title="transcript.download">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="transcript-text" class="result-text"></div>
          <div class="result-footer">
            <button id="summarize-btn" class="btn-primary" data-i18n="summary.generate">Generate Summary</button>
          </div>
        </section>

        <!-- Summary Section -->
        <section id="summary-section" class="result-section" hidden>
          <div class="result-header">
            <h2 data-i18n="summary.title">Summary</h2>
            <div class="result-actions">
              <button id="copy-summary-btn" class="btn-icon-sm" title="Copy" data-i18n-title="summary.copy">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
              <button id="download-summary-btn" class="btn-icon-sm" title="Download" data-i18n-title="summary.download">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="summary-text" class="result-text"></div>
        </section>
      </main>

      <!-- ===== History Sidebar ===== -->
      <aside class="history-sidebar">
        <h2 data-i18n="history.title">History</h2>
        <div id="history-list" class="history-list">
          <p class="history-empty" data-i18n="history.empty">No transcriptions yet</p>
        </div>
      </aside>
    </div>
  </div>

  <!-- ===== Settings Modal ===== -->
  <div id="settings-modal" class="modal" hidden>
    <div class="modal-overlay"></div>
    <div class="modal-dialog">
      <header class="modal-header">
        <h2 data-i18n="settings.title">Settings</h2>
        <button id="settings-close" class="btn-icon-sm" title="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </header>
      <div class="modal-body">
        <!-- API Key -->
        <div class="form-group">
          <label for="api-key-input" data-i18n="settings.apiKey">Groq API Key</label>
          <div class="input-with-toggle">
            <input type="password" id="api-key-input" class="form-input" placeholder="Enter your Groq API key" data-i18n-placeholder="settings.apiKeyPlaceholder">
            <button id="toggle-api-key" class="btn-icon-sm input-toggle" type="button" title="Show/hide key">
              <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="form-help">
            <span data-i18n="settings.apiKeyHelp">Get a free API key at</span>
            <a href="https://console.groq.com/keys" target="_blank" rel="noopener noreferrer">console.groq.com/keys</a>
          </p>
        </div>

        <!-- Audio Language -->
        <div class="form-group">
          <label for="audio-lang-select" data-i18n="settings.language">Audio Language</label>
          <select id="audio-lang-select" class="form-input">
            <option value="pt">Portuguese</option>
            <option value="en">English</option>
          </select>
        </div>

        <!-- Save Button -->
        <div class="form-actions">
          <button id="settings-save-btn" class="btn-primary" data-i18n="settings.save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Toast Notification ===== -->
  <div id="toast" class="toast" hidden>
    <span id="toast-message"></span>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
